<mat-toolbar color="primary" class="app-toolbar">
  <span class="app-title">
    <mat-icon>restaurant</mat-icon>
    今日のランチおすすめ
  </span>
  <span class="spacer"></span>
  <nav class="app-nav">
    <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>casino</mat-icon>
      <span class="nav-label">おすすめ</span>
    </a>
    <a mat-button routerLink="/data" routerLinkActive="active">
      <mat-icon>upload_file</mat-icon>
      <span class="nav-label">取り込み</span>
    </a>
    <a mat-button routerLink="/settings" routerLinkActive="active">
      <mat-icon>settings</mat-icon>
      <span class="nav-label">設定</span>
    </a>
  </nav>
</mat-toolbar>

<main class="app-content">
  <router-outlet />
</main>

<!-- スマホ専用の下部固定タブバー（PC では CSS で非表示）。リンク先はトップナビと同一 -->
<nav class="app-bottom-nav">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
    <mat-icon>casino</mat-icon>
    <span class="tab-label">おすすめ</span>
  </a>
  <a routerLink="/data" routerLinkActive="active">
    <mat-icon>upload_file</mat-icon>
    <span class="tab-label">取り込み</span>
  </a>
  <a routerLink="/settings" routerLinkActive="active">
    <mat-icon>settings</mat-icon>
    <span class="tab-label">設定</span>
  </a>
</nav>
