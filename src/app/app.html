<!-- @file アプリシェル。router-outlet（メインコンテンツ）と単一の nav（#bottomNav）を配置する。
     nav はモバイル幅では画面下部の固定タブバー、PC幅（768px以上）ではサイドバーに変形し、
     PCレイアウトでは先頭にアプリタイトル（sidebar-title）+ 格納/展開トグル（sidebar-toggle）を表示する
     （app.ts の sidebarCollapsed signal に連動）。isDev のときのみ開発タブ（/dev）を表示する。 -->
<div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed()">
  <main class="app-content">
    <router-outlet />
  </main>

  <nav class="app-nav" [class.collapsed]="sidebarCollapsed()" #bottomNav>
    <div class="sidebar-header">
      <a routerLink="/" class="sidebar-title">
        <mat-icon>restaurant</mat-icon>
        <span>今日のランチおすすめ</span>
      </a>
      <button
        type="button"
        class="sidebar-toggle"
        (click)="toggleSidebar()"
        [attr.aria-label]="sidebarCollapsed() ? 'サイドバーを展開' : 'サイドバーを格納'"
      >
        <mat-icon>{{ sidebarCollapsed() ? 'chevron_right' : 'chevron_left' }}</mat-icon>
      </button>
    </div>

    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
      <mat-icon>casino</mat-icon>
      <span>おすすめ</span>
    </a>
    <a routerLink="/data" routerLinkActive="active" class="nav-item">
      <mat-icon>upload_file</mat-icon>
      <span>取り込み</span>
    </a>
    <a routerLink="/settings" routerLinkActive="active" class="nav-item">
      <mat-icon>settings</mat-icon>
      <span>設定</span>
    </a>
    @if (isDev) {
      <a routerLink="/dev" routerLinkActive="active" class="nav-item">
        <mat-icon>bug_report</mat-icon>
        <span>開発</span>
      </a>
    }
  </nav>
</div>
